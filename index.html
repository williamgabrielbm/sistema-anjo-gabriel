<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Espaço Infantil Anjo Gabriel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
    <style>
        :root {
            --primary: #006437;
            --secondary: #2ecc71;
            --background: #f4f7f6;
            --sidebar-bg: #ffffff;
            --text: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; display: flex; height: 100vh;
            background-color: var(--background); color: var(--text);
        }
        .sidebar { width: 250px; background-color: var(--sidebar-bg); box-shadow: 2px 0 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; z-index: 10; }
        .logo-area { padding: 30px 20px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        .logo-area h2 { margin: 0; color: var(--primary); font-size: 1.5em; }
        .logo-area span { color: var(--secondary); font-size: 0.9em; font-weight: bold; }
        .menu { flex-grow: 1; padding: 20px 0; }
        .menu a { display: block; padding: 15px 25px; color: #555; text-decoration: none; font-size: 16px; border-left: 4px solid transparent; transition: 0.3s; }
        .menu a:hover, .menu a.ativo { background-color: #f8f9fa; border-left-color: var(--primary); color: var(--primary); font-weight: bold; }
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        h1 { margin-top: 0; color: var(--primary); }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 5px solid var(--secondary); }
        .card h3 { margin: 0 0 10px 0; color: #7f8c8d; font-size: 1em; font-weight: normal; }
        .card .numero { font-size: 2.5em; font-weight: bold; color: var(--primary); margin: 0; }
        .grafico-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <h2>Anjo Gabriel</h2>
            <span>SISTEMA DE GESTÃO</span>
        </div>
        <nav class="menu">
            <a href="index.html" class="ativo">📊 Dashboard</a>
            <a href="cadastro.html">📝 Novo Cadastro</a>
            <a href="contratos.html">🖨️ Contratos</a>
            <a href="financeiro.html">💰 Financeiro</a>
        </nav>
    </aside>

    <main class="main-content">
        <h1>Visão Geral</h1>
        <div class="cards">
            <div class="card">
                <h3>Total de Alunos</h3>
                <p class="numero" id="dashTotalAlunos">0</p>
            </div>
            <div class="card" style="border-left-color: var(--primary);">
                <h3>Contratos Ativos</h3>
                <p class="numero" id="dashContratos">0</p>
            </div>
        </div>
        <div class="grafico-container">
            <h3 style="color: var(--primary); margin-top: 0;">Crescimento de Matrículas</h3>
            <canvas id="meuGrafico" height="80"></canvas>
        </div>
    </main>

    <script>
        const alunos = JSON.parse(localStorage.getItem('alunosAnjoGabriel')) || [];
        document.getElementById('dashTotalAlunos').innerText = alunos.length;
        document.getElementById('dashContratos').innerText = alunos.length;

        const ctx = document.getElementById('meuGrafico').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Janeiro', 'Fevereiro', 'Março'],
                datasets: [{
                    label: 'Alunos Cadastrados',
                    data: [5, 12, alunos.length], 
                    backgroundColor: '#2ecc71',
                    borderRadius: 5
                }]
            },
            options: { scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    </script>
</body>
</html>
